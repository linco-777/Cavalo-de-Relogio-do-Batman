<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Itens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/static/add.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/home">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/tbladd">Adicionar Itens</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tblvizu">Visualizar Itens</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tblmove">Entrada e Saída</a></li>
                    {% if session.get("permissao") == "admin" %}
                    <li class="nav-item"><a class="nav-link" href="/cadastroadm">Cadastrar Usuários</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <h4>Adicionar Item ao Estoque</h4>
        <form method="POST" action="/tbladd">
            <div class="mb-3">
                <label class="form-label">Nome do Item</label>
                <input type="text" name="nome" class="form-control" required>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">Quantidade</label>
                    <input type="number" name="qntd" class="form-control" min="0" required>
                </div>
                <div class="col mb-3">
                    <label class="form-label">Estoque Mínimo</label>
                    <input type="number" name="estoque_minimo" class="form-control" min="0" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea name="descricao" class="form-control" rows="3" placeholder="Descrição adicional do item"></textarea>
            </div>
            <div class="row">
                <div class="col mb-3">
                    <label class="form-label">Preço (R$)</label>
                    <input type="number" name="preco" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="col mb-3">
                    <label class="form-label">Categoria</label>
                    <select name="categoria" class="form-select" required>
                        <option value="eletrica">Elétrica</option>
                        <option value="mecanica">Mecânica</option>
                        <option value="geral">Geral</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Link da Foto</label>
                <input type="text" name="foto" class="form-control" placeholder="https://exemplo.com/foto.jpg">
            </div>
            <button type="submit" class="btn-adicionar">Adicionar Item</button>
        </form>
    </div>

    {% if get_flashed_messages() %}
        {% set msgs = get_flashed_messages(with_categories=true) %}
        <script>
            {% for categoria, mensagem in msgs %}
                Swal.fire({
                    icon: '{{ "success" if categoria == "success" else "error" }}',
                    title: '{{ mensagem }}',
                    confirmButtonColor: '#192A6B'
                });
            {% endfor %}
        </script>
    {% endif %}
</body>
</html>
